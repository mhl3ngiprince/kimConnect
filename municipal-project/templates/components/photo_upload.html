<!-- Advanced Photo Upload Component -->
<div x-data="{
    images: [],
    maxImages: 4,
    isProcessing: false,
    aiAnalysis: null,
    cameraStream: null,
    showCamera: false,
    
    init() {
        // Check camera support
        this.hasCamera = 'mediaDevices' in navigator && 'getUserMedia' in navigator.mediaDevices;
    },
    
    hasCamera: false,
    
    async captureFromCamera() {
        try {
            this.cameraStream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'environment' }
            });
            this.showCamera = true;
            this.$nextTick(() => {
                const video = this.$refs.cameraVideo;
                if (video) video.srcObject = this.cameraStream;
            });
        } catch (err) {
            console.error('Camera access denied:', err);
            this.showToast('Camera access denied. Please check permissions.', 'error');
        }
    },
    
    takePhoto() {
        const video = this.$refs.cameraVideo;
        const canvas = this.$refs.cameraCanvas;
        
        if (!video || !canvas) return;
        
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        
        canvas.toBlob((blob) => {
            const file = new File([blob], `photo_${Date.now()}.jpg`, { type: 'image/jpeg' });
            this.addImage(file);
            this.stopCamera();
        }, 'image/jpeg', 0.8);
    },
    
    stopCamera() {
        if (this.cameraStream) {
            this.cameraStream.getTracks().forEach(track => track.stop());
            this.cameraStream = null;
        }
        this.showCamera = false;
    },
    
    handleFileSelect(event) {
        const files = Array.from(event.target.files);
        files.forEach(file => {
            if (this.images.length < this.maxImages) {
                this.addImage(file);
            }
        });
    },
    
    addImage(file) {
        if (this.images.length >= this.maxImages) {
            this.showToast(`Maximum ${this.maxImages} photos allowed`, 'warning');
            return;
        }
        
        const reader = new FileReader();
        reader.onload = (e) => {
            const imageId = Date.now();
            this.images.push({
                id: imageId,
                url: e.target.result,
                file: file,
                caption: '',
                analyzing: false
            });
            
            // Auto-analyze with AI
            this.analyzeImage(imageId, file);
        };
        reader.readAsDataURL(file);
    },
    
    removeImage(id) {
        this.images = this.images.filter(img => img.id !== id);
        if (this.aiAnalysis && this.aiAnalysis.id === id) {
            this.aiAnalysis = null;
        }
    },
    
    async analyzeImage(imageId, file) {
        const image = this.images.find(img => img.id === imageId);
        if (!image) return;
        
        image.analyzing = true;
        
        // Simulate AI analysis (in production, call actual AI service)
        await new Promise(resolve => setTimeout(resolve, 1500));
        
        // Mock AI insights
        const insights = [
            { type: 'severity', label: 'Severity', value: 'High', confidence: 92 },
            { type: 'category', label: 'Detected', value: 'Road Damage', confidence: 88 },
            { type: 'location', label: 'Location', value: 'Street Level', confidence: 95 }
        ];
        
        image.aiInsights = insights;
        image.analyzing = false;
        image.severity = 'high';
        
        this.showToast('AI analysis complete', 'success');
    },
    
    getSeverityColor(severity) {
        return {
            'low': 'bg-green-100 text-green-700',
            'medium': 'bg-amber-100 text-amber-700',
            'high': 'bg-red-100 text-red-700'
        }[severity] || 'bg-gray-100 text-gray-700';
    },
    
    formatFileSize(bytes) {
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
        return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    },
    
    showToast(message, type = 'info') {
        // Reuse toast from other components
        const toast = document.createElement('div');
        toast.className = `fixed top-20 right-4 px-6 py-3 rounded-xl shadow-xl z-50 flex items-center gap-3 animate-slide-up ${
            type === 'success' ? 'bg-green-600 text-white' : 
            type === 'error' ? 'bg-red-600 text-white' : 
            type === 'warning' ? 'bg-amber-500 text-white' :
            'bg-gray-800 text-white'
        }`;
        toast.innerHTML = `<i data-lucide='${type === 'success' ? 'check-circle' : type === 'error' ? 'alert-circle' : 'info'}' class='w-5 h-5'></i><span>${message}</span>`;
        document.body.appendChild(toast);
        lucide.createIcons();
        setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
    }
}">

    <!-- Camera Modal -->
    <div x-show="showCamera" 
         x-cloak
         class="fixed inset-0 bg-black z-50 flex flex-col">
        <div class="absolute top-4 right-4 z-10">
            <button @click="stopCamera()" class="p-3 bg-white/20 hover:bg-white/30 rounded-full transition-colors">
                <i data-lucide="x" class="w-6 h-6 text-white"></i>
            </button>
        </div>
        
        <video x-ref="cameraVideo" 
               autoplay 
               playsinline 
               class="flex-1 object-cover"></video>
        
        <div class="absolute bottom-8 left-0 right-0 flex justify-center">
            <button @click="takePhoto()" 
                    class="w-20 h-20 bg-white rounded-full flex items-center justify-center shadow-xl hover:scale-105 transition-transform">
                <div class="w-16 h-16 border-4 border-primary-600 rounded-full"></div>
            </button>
        </div>
        
        <canvas x-ref="cameraCanvas" class="hidden"></canvas>
    </div>

    <!-- Upload Area -->
    <div class="space-y-4">
        <!-- Drop Zone -->
        <div class="border-2 border-dashed border-gray-200 dark:border-gray-700 rounded-2xl p-8 text-center hover:border-primary-400 dark:hover:border-primary-600 transition-colors"
             :class="{'border-primary-500 bg-primary-50 dark:bg-primary-900/10': isDragging}"
             @dragover.prevent="isDragging = true"
             @dragleave="isDragging = false"
             @drop.prevent="handleDrop($event)">
            
            <div class="flex flex-col items-center">
                <div class="w-16 h-16 bg-primary-100 dark:bg-primary-900/30 rounded-full flex items-center justify-center mb-4">
                    <i data-lucide="camera" class="w-8 h-8 text-primary-600"></i>
                </div>
                <p class="text-lg font-medium text-gray-700 dark:text-gray-300">Upload Photos</p>
                <p class="text-sm text-gray-500 mt-1">Drag & drop or click to upload (max <span x-text="maxImages"></span> photos)</p>
                
                <div class="flex gap-3 mt-4">
                    <label class="cursor-pointer px-6 py-2.5 bg-primary-600 text-white rounded-xl font-medium hover:bg-primary-700 transition-colors">
                        <i data-lucide="upload" class="w-4 h-4 inline mr-2"></i>
                        Choose Files
                        <input type="file" accept="image/*" multiple class="hidden" @change="handleFileSelect($event)">
                    </label>
                    
                    <button x-show="hasCamera" 
                            @click="captureFromCamera()"
                            class="px-6 py-2.5 border border-gray-200 dark:border-gray-700 rounded-xl font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
                        <i data-lucide="camera" class="w-4 h-4 inline mr-2"></i>
                        Take Photo
                    </button>
                </div>
            </div>
        </div>

        <!-- Image Previews -->
        <div x-show="images.length > 0" class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <template x-for="image in images" :key="image.id">
                <div class="relative group">
                    <div class="aspect-square rounded-xl overflow-hidden bg-gray-100 dark:bg-gray-700">
                        <img :src="image.url" class="w-full h-full object-cover">
                        
                        <!-- Loading Overlay -->
                        <div x-show="image.analyzing" class="absolute inset-0 bg-black/50 flex items-center justify-center">
                            <div class="text-center text-white">
                                <i data-lucide="loader-2" class="w-8 h-8 animate-spin mx-auto"></i>
                                <p class="text-sm mt-2">Analyzing...</p>
                            </div>
                        </div>
                        
                        <!-- Remove Button -->
                        <button @click="removeImage(image.id)" 
                                class="absolute top-2 right-2 p-1.5 bg-red-500 text-white rounded-full opacity-0 group-hover:opacity-100 transition-opacity hover:bg-red-600">
                            <i data-lucide="x" class="w-4 h-4"></i>
                        </button>
                    </div>
                    
                    <!-- AI Insights Badge -->
                    <div x-show="image.aiInsights" class="absolute bottom-2 left-2">
                        <span class="px-2 py-1 text-xs font-medium rounded-lg backdrop-blur-sm"
                              :class="getSeverityColor(image.severity)">
                            <i data-lucide="sparkles" class="w-3 h-3 inline mr-1"></i>
                            AI Analyzed
                        </span>
                    </div>
                    
                    <!-- Caption -->
                    <input type="text" 
                           x-model="image.caption"
                           placeholder="Add caption..."
                           class="mt-2 w-full px-3 py-2 text-sm border border-gray-200 dark:border-gray-700 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent dark:bg-gray-800">
                </div>
            </template>
        </div>

        <!-- AI Analysis Summary -->
        <div x-show="images.some(img => img.aiInsights)" class="bg-gradient-to-r from-purple-50 to-indigo-50 dark:from-purple-900/20 dark:to-indigo-900/20 rounded-xl p-4 border border-purple-100 dark:border-purple-800">
            <div class="flex items-center gap-2 mb-3">
                <i data-lucide="sparkles" class="w-5 h-5 text-purple-600"></i>
                <span class="font-semibold text-purple-900 dark:text-purple-100">AI Analysis Summary</span>
            </div>
            <div class="grid grid-cols-3 gap-4">
                <template x-for="image in images.filter(img => img.aiInsights)" :key="image.id">
                    <div class="text-center">
                        <p class="text-2xl font-bold text-gray-900 dark:text-white" x-text="image.severity.toUpperCase()"></p>
                        <p class="text-xs text-gray-500" x-text="image.id"></p>
                    </div>
                </template>
            </div>
        </div>

        <!-- Storage Info -->
        <p x-show="images.length > 0" class="text-xs text-gray-400 text-center">
            <span x-text="images.length"></span> / <span x-text="maxImages"></span> photos • 
            Total: <span x-text="images.reduce((acc, img) => acc + (img.file?.size || 0), 0) | formatFileSize"></span>
        </p>
    </div>
</div>
